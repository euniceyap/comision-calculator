<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>主播提成计算器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #fff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
    --text: #1a1a18; --muted: #6b6b65; --faint: #a0a09a;
    --teal: #0f6e56; --teal-bg: #e1f5ee; --teal-dark: #085041;
    --blue: #185fa5; --blue-bg: #e6f1fb; --blue-dark: #0c447c;
    --red: #c0392b; --red-bg: #fdecea;
    --r: 14px; --rs: 10px;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 1.2rem 1rem 5rem;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 480px; margin: 0 auto; }

  header { margin-bottom: 1.4rem; }
  .eyebrow { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin-bottom: 5px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -.4px; }
  .subtitle { margin-top: 5px; font-size: 13px; color: var(--muted); line-height: 1.5; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
  .tab {
    flex: 1; padding: 10px 0; border-radius: var(--rs); border: 0.5px solid var(--border-strong);
    background: var(--surface); font-size: 13px; font-weight: 600; color: var(--muted);
    cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .tab.active { background: var(--teal); color: #fff; border-color: var(--teal); }

  .section { display: none; }
  .section.active { display: block; }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1.1rem; margin-bottom: .85rem; }
  .card-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin-bottom: 1rem; }

  .input-group { margin-bottom: 1rem; }
  .input-group:last-child { margin-bottom: 0; }
  .input-group > label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }

  .stepper { display: flex; align-items: center; border: 0.5px solid var(--border-strong); border-radius: var(--rs); overflow: hidden; height: 54px; }
  .stepper button {
    width: 54px; height: 54px; border: none; background: var(--surface2); color: var(--teal);
    font-size: 26px; font-weight: 300; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
  }
  .stepper button:active { background: #d5e8e2; }
  .stepper input[type=number] {
    flex: 1; height: 54px; border: none; background: transparent;
    font-size: 22px; font-weight: 700; color: var(--text); text-align: center;
    outline: none; -moz-appearance: textfield; padding: 0; min-width: 0;
  }
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .slider-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .slider-row input[type=range] {
    flex: 1; min-width: 0; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: var(--surface2); outline: none; cursor: pointer; touch-action: pan-x;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
    background: var(--teal); border: 3px solid #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.25); cursor: pointer;
  }
  .slider-row input[type=range]::-moz-range-thumb {
    width: 28px; height: 28px; border-radius: 50%; background: var(--teal); border: 3px solid #fff; cursor: pointer;
  }
  .slider-val { font-size: 15px; font-weight: 700; color: var(--text); min-width: 56px; text-align: right; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: .85rem; }
  .metric { background: var(--surface2); border-radius: var(--rs); padding: .9rem; }
  .mlabel { font-size: 11px; color: var(--faint); margin-bottom: 5px; font-weight: 500; }
  .mval { font-size: 20px; font-weight: 700; line-height: 1.1; }
  .mval.rmb { color: var(--teal); } .mval.rm { color: var(--blue); } .mval.neu { color: var(--text); }

  .breakdown .brow { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .breakdown .brow:last-child { border-bottom: none; }
  .bl { font-size: 13px; color: var(--muted); }
  .bv { font-size: 13px; font-weight: 700; }

  /* Add record */
  .date-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .date-input-row .dg { flex: 1; }
  .date-input-row .dg label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }
  input[type=date] {
    width: 100%; height: 46px; border: 0.5px solid var(--border-strong);
    border-radius: var(--rs); background: var(--surface); font-size: 15px;
    font-weight: 600; color: var(--text); padding: 0 12px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .yl-input {
    width: 100%; height: 46px; border: 0.5px solid var(--border-strong);
    border-radius: var(--rs); background: var(--surface); font-size: 15px;
    font-weight: 700; color: var(--text); padding: 0 12px; outline: none; -moz-appearance: textfield;
  }
  .yl-input::-webkit-outer-spin-button, .yl-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .add-btn {
    height: 46px; padding: 0 18px; background: var(--teal); color: #fff;
    border: none; border-radius: var(--rs); font-size: 14px; font-weight: 700;
    cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; flex-shrink: 0;
  }
  .add-btn:active { background: var(--teal-dark); }

  /* Current month block */
  .month-block { background: var(--surface); border: 0.5px solid rgba(15,110,86,0.2); border-radius: var(--r); margin-bottom: .85rem; overflow: hidden; }
  .month-header { background: var(--teal-bg); padding: .9rem 1rem; display: flex; justify-content: space-between; align-items: center; }
  .mh-left .mh-name { font-size: 14px; font-weight: 700; color: var(--teal-dark); }
  .mh-left .mh-days { font-size: 12px; color: var(--teal); margin-top: 2px; }
  .mh-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .mh-stat { font-size: 12px; font-weight: 600; }
  .mh-stat.g { color: var(--teal-dark); } .mh-stat.b { color: var(--blue-dark); }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 1rem; border-bottom: 0.5px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-date { font-size: 13px; color: var(--muted); font-weight: 500; }
  .log-right { display: flex; align-items: center; gap: 10px; }
  .log-yl { font-size: 14px; font-weight: 700; }
  .log-del {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--red-bg); color: var(--red); font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex-shrink: 0;
  }
  .log-del:active { background: #f5c6c2; }

  /* Past months — single collapsible section */
  .past-section { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--r); margin-bottom: .85rem; overflow: hidden; }
  .past-section-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: .9rem 1rem; cursor: pointer;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
  }
  .past-section-header:active { background: var(--surface2); }
  .past-section-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .past-section-sub { font-size: 12px; color: var(--faint); margin-top: 2px; }
  .chevron { font-size: 13px; color: var(--faint); transition: transform 0.25s; }
  .chevron.open { transform: rotate(180deg); }

  .past-section-body { display: none; border-top: 0.5px solid var(--border); }
  .past-section-body.open { display: block; }

  .past-month-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 1rem; border-bottom: 0.5px solid var(--border);
  }
  .past-month-row:last-child { border-bottom: none; }
  .pmr-left .pmr-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .pmr-left .pmr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pmr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .pmr-right .pmr-stat { font-size: 12px; font-weight: 600; }
  .pmr-right .pmr-stat.g { color: var(--teal); }
  .pmr-right .pmr-stat.b { color: var(--blue); }

  .empty-state { text-align: center; padding: 2rem 0; color: var(--faint); font-size: 13px; }

  footer { margin-top: 1.5rem; text-align: center; font-size: 11px; color: var(--faint); line-height: 1.9; }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="eyebrow">兼职主播工具</div>
    <h1>提成计算器</h1>
    <p class="subtitle">输入总音浪推算提成，或按日记录追踪月总音浪</p>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-calc" onclick="switchTab('calc')">提成计算</div>
    <div class="tab" id="tab-log" onclick="switchTab('log')">每日记录</div>
  </div>

  <!-- SECTION: Calculator -->
  <div class="section active" id="sec-calc">
    <div class="card">
      <div class="card-title">输入数据</div>
      <div class="input-group">
        <label>总音浪</label>
        <div class="stepper">
          <button id="btn-minus" type="button">−</button>
          <input type="number" id="yinlang" value="30000" min="0" step="500" inputmode="numeric">
          <button id="btn-plus" type="button">+</button>
        </div>
      </div>
      <div class="input-group">
        <label>直播天数</label>
        <div class="slider-row">
          <input type="range" id="days" min="1" max="31" value="20" step="1">
          <span class="slider-val" id="days-out">20 天</span>
        </div>
      </div>
      <div class="input-group">
        <label>提成比例</label>
        <div class="slider-row">
          <input type="range" id="rate" min="10" max="80" value="50" step="5">
          <span class="slider-val" id="rate-out">50%</span>
        </div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="mlabel">换算 RMB</div><div class="mval neu" id="r0">-</div></div>
      <div class="metric"><div class="mlabel">提成 RMB</div><div class="mval rmb" id="r1">-</div></div>
      <div class="metric"><div class="mlabel">提成 RM</div><div class="mval rm" id="r2">-</div></div>
      <div class="metric"><div class="mlabel">每日均摊 RM</div><div class="mval rm" id="r3">-</div></div>
    </div>
    <div class="card">
      <div class="card-title">计算明细</div>
      <div class="breakdown">
        <div class="brow"><span class="bl">音浪 ÷ 10</span><span class="bv" id="b0">-</span></div>
        <div class="brow"><span class="bl">× 提成比例</span><span class="bv" id="b1">-</span></div>
        <div class="brow"><span class="bl">提成 RMB</span><span class="bv" id="b2">-</span></div>
        <div class="brow"><span class="bl">换算 RM（÷ 1.67）</span><span class="bv" id="b3">-</span></div>
        <div class="brow"><span class="bl">每日均摊（÷ <span id="bdays">20</span> 天）</span><span class="bv" id="b4">-</span></div>
      </div>
    </div>
  </div>

  <!-- SECTION: Daily Log -->
  <div class="section" id="sec-log">
    <div class="card">
      <div class="card-title">添加记录</div>
      <div class="date-input-row">
        <div class="dg"><label>日期</label><input type="date" id="log-date"></div>
        <div class="dg"><label>音浪</label><input type="number" class="yl-input" id="log-yl" placeholder="例：30000" inputmode="numeric" min="0"></div>
        <button class="add-btn" id="add-btn" type="button">添加</button>
      </div>
    </div>

    <!-- Current month -->
    <div id="cur-month-wrap"></div>

    <!-- Past months collapsible -->
    <div id="past-wrap"></div>

    <div id="empty-log" class="empty-state" style="display:none">还没有记录，添加今天的音浪吧！</div>
  </div>

  <footer>
    汇率：1 RM = 1.67 RMB · 提成 50%<br>
    数据保存在本机，清除浏览器数据会重置
  </footer>
</div>

<script>
(function() {
  var EX = 1.67, RATE = 0.5;
  var MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  function fmt(n) { return Math.round(n).toLocaleString(); }
  function monthLabel(key) { var p=key.split('-'); return p[0]+'年 '+MONTH_NAMES[parseInt(p[1])-1]; }
  function formatDay(str) { var p=str.split('-'); return p[1]+'/'+p[2]; }
  function todayStr() {
    var d=new Date();
    return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
  }
  function currentMonthKey() {
    var d=new Date();
    return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);
  }

  window.switchTab = function(tab) {
    ['calc','log'].forEach(function(t){
      document.getElementById('sec-'+t).classList.toggle('active',t===tab);
      document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    });
  };

  /* ── Calculator ── */
  function calc() {
    var yl=parseFloat(document.getElementById('yinlang').value)||0;
    var days=parseInt(document.getElementById('days').value)||1;
    var rate=parseInt(document.getElementById('rate').value)/100;
    document.getElementById('days-out').textContent=days+' 天';
    document.getElementById('rate-out').textContent=Math.round(rate*100)+'%';
    document.getElementById('bdays').textContent=days;
    var base=yl/10,rmbC=base*rate,rmC=rmbC/EX,daily=rmC/days;
    document.getElementById('r0').textContent='RMB '+fmt(base);
    document.getElementById('r1').textContent='RMB '+fmt(rmbC);
    document.getElementById('r2').textContent='RM '+fmt(rmC);
    document.getElementById('r3').textContent='RM '+fmt(daily);
    document.getElementById('b0').textContent='RMB '+fmt(base);
    document.getElementById('b1').textContent=Math.round(rate*100)+'%';
    document.getElementById('b2').textContent='RMB '+fmt(rmbC);
    document.getElementById('b3').textContent='RM '+fmt(rmC);
    document.getElementById('b4').textContent='RM '+fmt(daily);
  }

  function addTap(el,fn) {
    el.addEventListener('touchend',function(e){e.preventDefault();fn();},{passive:false});
    el.addEventListener('click',fn);
  }
  addTap(document.getElementById('btn-minus'),function(){
    var el=document.getElementById('yinlang'); el.value=Math.max(0,(parseFloat(el.value)||0)-500); calc();
  });
  addTap(document.getElementById('btn-plus'),function(){
    var el=document.getElementById('yinlang'); el.value=(parseFloat(el.value)||0)+500; calc();
  });
  ['input','change','touchmove','touchend'].forEach(function(e){
    document.getElementById('days').addEventListener(e,calc,{passive:true});
    document.getElementById('rate').addEventListener(e,calc,{passive:true});
  });
  document.getElementById('yinlang').addEventListener('input',calc);
  document.getElementById('yinlang').addEventListener('change',calc);

  /* ── Logs ── */
  function loadLogs(){ try{ return JSON.parse(localStorage.getItem('yl_logs')||'[]'); }catch(e){ return []; } }
  function saveLogs(l){ try{ localStorage.setItem('yl_logs',JSON.stringify(l)); }catch(e){} }

  function renderLogs() {
    var logs=loadLogs();
    var curWrap=document.getElementById('cur-month-wrap');
    var pastWrap=document.getElementById('past-wrap');
    var emptyEl=document.getElementById('empty-log');

    if (logs.length===0) {
      curWrap.innerHTML=''; pastWrap.innerHTML='';
      emptyEl.style.display='block'; return;
    }
    emptyEl.style.display='none';

    var mk=currentMonthKey();
    var grouped={};
    logs.forEach(function(l){ var m=l.date.slice(0,7); if(!grouped[m]) grouped[m]=[]; grouped[m].push(l); });
    var months=Object.keys(grouped).sort(function(a,b){ return b.localeCompare(a); });
    var curEntries=grouped[mk]||[];
    var pastMonths=months.filter(function(m){ return m!==mk; });

    /* Current month */
    if (curEntries.length===0) {
      curWrap.innerHTML='';
    } else {
      curEntries.sort(function(a,b){ return b.date.localeCompare(a.date); });
      var totalYl=curEntries.reduce(function(s,l){ return s+l.yl; },0);
      var days=curEntries.length;
      var rmbC=(totalYl/10)*RATE, rmC=rmbC/EX;
      var rows=curEntries.map(function(l){
        return '<div class="log-item">'
          +'<span class="log-date">'+formatDay(l.date)+'</span>'
          +'<div class="log-right"><span class="log-yl">'+fmt(l.yl)+' 音浪</span>'
          +'<button class="log-del" onclick="delLog(\''+l.date+'\')" type="button">×</button>'
          +'</div></div>';
      }).join('');
      curWrap.innerHTML='<div class="month-block">'
        +'<div class="month-header">'
        +'<div class="mh-left"><div class="mh-name">'+monthLabel(mk)+'</div><div class="mh-days">'+days+' 天直播</div></div>'
        +'<div class="mh-right"><span class="mh-stat g">RMB '+fmt(rmbC)+'</span><span class="mh-stat b">RM '+fmt(rmC)+'</span></div>'
        +'</div>'+rows+'</div>';
    }

    /* Past months — single collapsible */
    if (pastMonths.length===0) {
      pastWrap.innerHTML=''; return;
    }
    var pastRows=pastMonths.map(function(m){
      var entries=grouped[m];
      var totalYl=entries.reduce(function(s,l){ return s+l.yl; },0);
      var days=entries.length;
      var rmbC=(totalYl/10)*RATE, rmC=rmbC/EX;
      return '<div class="past-month-row">'
        +'<div class="pmr-left">'
        +'<div class="pmr-name">'+monthLabel(m)+'</div>'
        +'<div class="pmr-sub">'+fmt(totalYl)+' 音浪 · '+days+' 天</div>'
        +'</div>'
        +'<div class="pmr-right">'
        +'<span class="pmr-stat g">RMB '+fmt(rmbC)+'</span>'
        +'<span class="pmr-stat b">RM '+fmt(rmC)+'</span>'
        +'</div>'
        +'</div>';
    }).join('');

    pastWrap.innerHTML='<div class="past-section">'
      +'<div class="past-section-header" onclick="togglePast()">'
      +'<div><div class="past-section-title">月份总音浪</div>'
      +'<div class="past-section-sub">共 '+pastMonths.length+' 个月的记录</div></div>'
      +'<span class="chevron" id="past-chev">▾</span>'
      +'</div>'
      +'<div class="past-section-body" id="past-body">'+pastRows+'</div>'
      +'</div>';
  }

  window.togglePast = function() {
    var body=document.getElementById('past-body');
    var chev=document.getElementById('past-chev');
    var open=body.classList.contains('open');
    body.classList.toggle('open',!open);
    chev.classList.toggle('open',!open);
  };

  window.delLog = function(date) {
    saveLogs(loadLogs().filter(function(l){ return l.date!==date; }));
    renderLogs();
  };

  document.getElementById('log-date').value=todayStr();

  addTap(document.getElementById('add-btn'),function(){
    var date=document.getElementById('log-date').value;
    var yl=parseFloat(document.getElementById('log-yl').value);
    if (!date||!yl||yl<=0){ alert('请填写日期和音浪数量'); return; }
    var logs=loadLogs().filter(function(l){ return l.date!==date; });
    logs.push({date:date,yl:yl});
    saveLogs(logs);
    document.getElementById('log-yl').value='';
    renderLogs();
  });

  calc();
  renderLogs();
})();
</script>
</body>
</html>
